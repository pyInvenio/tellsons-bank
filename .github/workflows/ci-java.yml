name: Java services

on:
  pull_request:
    paths:
      - 'services/payments-core/**'
      - 'services/pii-vault/**'
      - 'services/accounts-ledger/**'
      - 'services/fraud-signals/**'
      - 'build.gradle'
      - 'settings.gradle'
  push:
    branches: [main]

jobs:
  java-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.6.1'
      - run: >
          gradle
          :services:payments-core:test
          :services:pii-vault:test
          :services:accounts-ledger:test
          :services:fraud-signals:test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: java-coverage
          path: services/**/build/reports/jacoco/test/
