name: Compliance coverage ratchet

on:
  pull_request:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:
    inputs:
      max_acu_limit:
        description: ACU cap for a Devin session opened by this run
        required: true
        default: '2'

jobs:
  coverage-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.6.1'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Generate Java coverage reports
        continue-on-error: true
        run: gradle :services:payments-core:test :services:pii-vault:test
      - name: Generate auth coverage report
        continue-on-error: true
        working-directory: services/auth-gateway
        run: |
          npm install
          npm test
      - name: Check compliance-path coverage
        id: gate
        continue-on-error: true
        run: python .github/scripts/coverage_gate.py --paths transaction,auth,pii,audit --min 80
      - name: Upload ratchet evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-ratchet-evidence
          path: |
            coverage-ratchet-evidence.md
            coverage-ratchet-evidence.json
          if-no-files-found: warn
      - name: Check for existing remediation PR
        if: steps.gate.outputs.below_threshold == 'true'
        id: existing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          python .github/scripts/find_open_remediation.py
          --service "${{ steps.gate.outputs.service }}"
          --path "${{ steps.gate.outputs.path_family }}"
      - name: Open Devin session on gap
        if: steps.gate.outputs.below_threshold == 'true' && steps.existing.outputs.exists != 'true'
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
          DEVIN_PLAYBOOK_ID: ${{ secrets.DEVIN_PLAYBOOK_ID }}
          DEVIN_PLAYBOOK_ID_COMPLIANCE_TESTS: ${{ secrets.DEVIN_PLAYBOOK_ID_COMPLIANCE_TESTS }}
          DEVIN_KNOWLEDGE_IDS: ${{ secrets.DEVIN_KNOWLEDGE_IDS }}
          DEVIN_KNOWLEDGE_ID_TELLSONS_DEMO_CONTEXT: ${{ secrets.DEVIN_KNOWLEDGE_ID_TELLSONS_DEMO_CONTEXT }}
          DEVIN_KNOWLEDGE_ID_TELLSONS_COMPLIANCE_PATHS: ${{ secrets.DEVIN_KNOWLEDGE_ID_TELLSONS_COMPLIANCE_PATHS }}
          DEVIN_KNOWLEDGE_ID_TELLSONS_DEVIN_API_NOTES: ${{ secrets.DEVIN_KNOWLEDGE_ID_TELLSONS_DEVIN_API_NOTES }}
          DEVIN_TRIGGER_SUMMARY_FILE: ${{ steps.gate.outputs.evidence_markdown }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          python .github/scripts/open_devin_session.py
          --service "${{ steps.gate.outputs.service }}"
          --path "${{ steps.gate.outputs.path_family }}"
          --title "Ratchet ${{ steps.gate.outputs.path_family }} coverage for ${{ steps.gate.outputs.service }}"
          --tag ratchet
          --tag tellsons-occ
          --max-acu-limit "${{ inputs.max_acu_limit || '10' }}"
          --comment-on-pr
      - name: Reuse existing remediation PR
        if: steps.gate.outputs.below_threshold == 'true' && steps.existing.outputs.exists == 'true'
        run: |
          {
            echo "## Existing Remediation PR"
            echo
            echo "The ratchet did not open a new Devin session because an open remediation PR already exists."
            echo
            echo "- Service: \`${{ steps.gate.outputs.service }}\`"
            echo "- Path: \`${{ steps.gate.outputs.path_family }}\`"
            echo "- PR: ${{ steps.existing.outputs.url }}"
          } >> "$GITHUB_STEP_SUMMARY"
