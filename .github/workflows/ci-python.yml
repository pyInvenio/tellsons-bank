name: Python support services

on:
  pull_request:
    paths:
      - 'services/customer-profile/**'
      - 'services/dispute-resolution/**'
      - 'services/risk-scoring/**'
  push:
    branches: [main]

jobs:
  python-support-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - customer-profile
          - dispute-resolution
          - risk-scoring
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test dependencies
        if: matrix.service == 'dispute-resolution'
        run: pip install pytest pytest-cov
      - name: Run tests (pytest)
        if: matrix.service == 'dispute-resolution'
        run: python -m pytest tests/ --cov=dispute_resolution --cov-branch --cov-report=term-missing
      - name: Run tests (unittest)
        if: matrix.service != 'dispute-resolution'
        run: python -m unittest discover -s tests -p '*_test.py'
