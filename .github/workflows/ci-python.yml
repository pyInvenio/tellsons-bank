name: Python support services

on:
  pull_request:
    paths:
      - 'services/customer-profile/**'
      - 'services/risk-scoring/**'
      - 'services/audit-logger/**'
  push:
    branches: [main]

jobs:
  python-support-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - customer-profile
          - risk-scoring
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m unittest discover -s tests -p '*_test.py'

  audit-logger-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/audit-logger
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements-dev.txt
      - run: >
          python -m pytest
          --cov=audit_logger --cov-branch
          --cov-report=term-missing
          --cov-report=json --cov-report=xml --cov-report=html
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-logger-coverage
          path: |
            services/audit-logger/coverage.json
            services/audit-logger/coverage.xml
            services/audit-logger/htmlcov
