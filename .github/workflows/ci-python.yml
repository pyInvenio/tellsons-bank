name: Python support services

on:
  pull_request:
    paths:
      - 'services/customer-profile/**'
      - 'services/risk-scoring/**'
      - 'services/audit-logger/**'
  push:
    branches: [main]

jobs:
  python-support-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - customer-profile
          - risk-scoring
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m unittest discover -s tests -p '*_test.py'

  audit-logger-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/audit-logger
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pytest coverage
      - run: coverage run -m pytest
      - run: coverage json
      - run: coverage html
      - run: coverage report
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-logger-coverage
          path: |
            services/audit-logger/coverage.json
            services/audit-logger/htmlcov
          if-no-files-found: warn
