[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["*_test.py", "test_*.py"]
addopts = "-ra"

[tool.coverage.run]
branch = true
source = ["audit_logger"]

[tool.coverage.report]
show_missing = true
skip_covered = false

[tool.coverage.json]
output = "coverage.json"

[tool.coverage.html]
directory = "coverage/html"
