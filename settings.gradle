pluginManagement {
    repositories {
        gradlePluginPortal()
        mavenCentral()
    }
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        mavenCentral()
    }
}

rootProject.name = 'tellsons-bank'
include 'services:payments-core'
include 'services:pii-vault'
include 'services:accounts-ledger'
include 'services:fraud-signals'
